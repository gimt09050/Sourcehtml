<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 사용 예제</title>
    <style>
        header{
            height: 80px;
            text-align: center;
        }
        section{
            width: 1200px;
            margin: 0 auto;
            /* 주로 부모에게 display: flex를 주면 자동으로 나란히 배치
            flot:left는 더 이상 필요가 없다. */
            display: flex;
            /* 주축방향의 정렬 담당 */
            justify-content: center;
            gap: 20px;
        }

        .div{
            width: 300px;
            text-align: center;
            border: 1px solid lightgray;
            border-radius: 10px;
            height: 100px;
        }

        .div a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>

</body>
</html>
